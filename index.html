<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipeline Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #ddd9d0;
      --border-strong: #b8b2a7;
      --text: #1a1a18;
      --muted: #7a7570;
      --accent: #1a5c38;
      --accent-light: #e8f5ee;
      --new: #0a4a7a;
      --new-light: #e6f0fa;
      --danger: #8a1a1a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--text);
      padding: 24px;
    }

    .login-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 32px;
    }

    .login-field {
      width: 100%;
      font-family: var(--mono);
      font-size: 14px;
      border: 1px solid var(--border);
      background: white;
      padding: 12px 16px;
      border-radius: 5px;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-align: center;
    }

    .login-field:focus { border-color: var(--text); }

    .login-btn {
      width: 100%;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .login-btn:hover { opacity: 0.85; }
    .login-error { font-family: var(--mono); font-size: 11px; color: var(--danger); margin-top: 12px; min-height: 16px; }
    .login-hint { font-size: 11px; color: var(--muted); margin-top: 24px; line-height: 1.6; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    header {
      background: var(--text);
      color: #f5f3ee;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }
    .site-title { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.45); font-family: var(--mono); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .refresh-info { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4); }

    .refresh-btn {
      font-family: var(--mono); font-size: 11px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15); padding: 6px 14px;
      border-radius: 4px; cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); }

    .logout-btn {
      font-family: var(--mono); font-size: 11px; background: none;
      color: rgba(255,255,255,0.4); border: none; cursor: pointer; transition: color 0.15s;
    }
    .logout-btn:hover { color: rgba(255,255,255,0.8); }

    .status-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 24px;
      font-family: var(--mono); font-size: 11px; color: var(--muted); flex-wrap: wrap;
    }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-new { background: var(--new); }
    .dot-ok  { background: var(--accent); }
    .dot-none { background: var(--border-strong); }
    .last-refresh { margin-left: auto; }

    .alert-bar {
      background: var(--new-light); border-bottom: 1px solid #b8d4f0;
      padding: 10px 24px; display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--new); flex-wrap: wrap;
    }
    .alert-bar input {
      font-family: var(--mono); font-size: 12px; border: 1px solid #b8d4f0;
      background: white; padding: 6px 10px; border-radius: 4px; color: var(--text); outline: none; width: 220px;
    }
    .alert-bar input:focus { border-color: var(--new); }
    .alert-save-btn {
      font-family: var(--mono); font-size: 11px; background: var(--new); color: white;
      border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer;
    }
    .alert-save-btn:hover { opacity: 0.85; }

    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .section-heading {
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

    .filter-btn {
      font-family: var(--mono); font-size: 11px; padding: 6px 14px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
      cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
    }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filter-btn:hover:not(.active) { border-color: var(--border-strong); color: var(--text); }

    .search-input {
      font-family: var(--mono); font-size: 12px; border: 1px solid var(--border);
      background: var(--surface); padding: 6px 12px; border-radius: 4px;
      color: var(--text); outline: none; width: 180px; margin-left: auto;
    }
    .search-input:focus { border-color: var(--border-strong); }

    .pipeline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

    .pipeline-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      overflow: hidden; transition: box-shadow 0.15s, border-color 0.15s;
    }
    .pipeline-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: var(--border-strong); }
    .pipeline-card.has-new     { border-left: 3px solid var(--new); }
    .pipeline-card.has-posting { border-left: 3px solid var(--accent); }
    .pipeline-card.no-posting  { border-left: 3px solid var(--border); opacity: 0.75; }

    .card-header {
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: #faf9f7;
    }
    .pipeline-name { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }

    .pipeline-badge {
      font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
      text-transform: uppercase; padding: 3px 8px; border-radius: 3px; font-weight: 600;
    }
    .badge-new     { background: var(--new-light);    color: var(--new);    border: 1px solid #b8d4f0; }
    .badge-active  { background: var(--accent-light); color: var(--accent); border: 1px solid #b8dcc8; }
    .badge-none    { background: #f0ede8; color: var(--muted); border: 1px solid var(--border); }
    .badge-loading { background: #f0ede8; color: var(--muted); border: 1px solid var(--border); animation: blink 1.2s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .card-body { padding: 14px 16px; }
    .posting-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
    .posting-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
    .posting-summary { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; border-left: 2px solid var(--border); padding-left: 10px; }
    .view-link { font-family: var(--mono); font-size: 11px; color: var(--new); text-decoration: none; }
    .view-link:hover { text-decoration: underline; }
    .no-posting-msg { font-size: 12px; color: var(--muted); font-style: italic; padding: 8px 0; }

    /* ── CHANGE PASSWORD MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
    .modal h3 { font-family: var(--mono); font-size: 14px; margin-bottom: 20px; letter-spacing: 1px; }
    .modal input {
      width: 100%; font-family: var(--mono); font-size: 13px;
      border: 1px solid var(--border); padding: 10px 12px; border-radius: 4px;
      color: var(--text); outline: none; margin-bottom: 10px;
    }
    .modal input:focus { border-color: var(--text); }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .modal-save { flex: 1; font-family: var(--mono); font-size: 12px; background: var(--text); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; letter-spacing: 1px; }
    .modal-cancel { flex: 1; font-family: var(--mono); font-size: 12px; background: none; color: var(--muted); border: 1px solid var(--border); padding: 10px; border-radius: 4px; cursor: pointer; }
    .modal-error { font-family: var(--mono); font-size: 11px; color: var(--danger); min-height: 14px; margin-top: 4px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg);
      font-family: var(--mono); font-size: 12px; padding: 12px 20px; border-radius: 6px;
      z-index: 999; opacity: 0; transform: translateY(10px); transition: all 0.25s;
      pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .header-sub, .refresh-info { display: none; }
      .main { padding: 16px; }
      .pipeline-grid { grid-template-columns: 1fr; }
      .search-input { width: 100%; margin-left: 0; }
      .status-bar { padding: 8px 16px; gap: 14px; }
      .last-refresh { margin-left: 0; width: 100%; }
      .alert-bar { padding: 10px 16px; }
      .alert-bar input { width: 100%; }
      .login-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Pipeline Monitor</div>
    <div class="login-title">Sign In</div>
    <input class="login-field" type="password" id="password-input" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') attemptLogin()"/>
    <button class="login-btn" onclick="attemptLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">Contact your team lead for the password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="header-left">
      <div class="site-title">Pipeline Monitor</div>
      <div class="header-divider"></div>
      <div class="header-sub">Informational Postings</div>
    </div>
    <div class="header-right">
      <div class="refresh-info">Next refresh: <span id="countdown">15:00</span></div>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-item"><div class="status-dot dot-new"></div> New posting</div>
    <div class="status-item"><div class="status-dot dot-ok"></div> Active posting</div>
    <div class="status-item"><div class="status-dot dot-none"></div> No posting</div>
    <div class="last-refresh">Last refreshed: <span id="last-refresh-time">—</span></div>
  </div>

  <div class="alert-bar">
    <span>📧 Email alerts:</span>
    <input type="email" id="email-input" placeholder="your@email.com"/>
    <button class="alert-save-btn" onclick="saveEmail()">Save</button>
    <span id="email-status" style="font-size:11px;"></span>
    <span style="margin-left:auto;cursor:pointer;font-size:11px;text-decoration:underline;color:var(--new);"
      onclick="openPwModal()">Change password</span>
  </div>

  <div class="main">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('new',this)">New</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('none',this)">No Posting</button>
      <input class="search-input" type="text" placeholder="Search pipelines..." oninput="filterSearch(this.value)"/>
    </div>
    <div class="section-heading">Pipeline Informational Postings — <span id="pipeline-count">27</span> Pipelines</div>
    <div class="pipeline-grid" id="pipeline-grid"></div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>Change Password</h3>
    <input type="password" id="pw-current" placeholder="Current password"/>
    <input type="password" id="pw-new" placeholder="New password (min 6 chars)"/>
    <input type="password" id="pw-confirm" placeholder="Confirm new password"/>
    <div class="modal-error" id="pw-error"></div>
    <div class="modal-actions">
      <button class="modal-save" onclick="changePassword()">Save</button>
      <button class="modal-cancel" onclick="closePwModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── PASSWORD ─────────────────────────────────────────────────────────────
  // Default password — change it anytime via the in-app "Change password" link.
  // The new password is saved in localStorage and persists across sessions.
  const DEFAULT_PASSWORD = 'pipeline2024';
  function getPassword() { return localStorage.getItem('dashPassword') || DEFAULT_PASSWORD; }

  function attemptLogin() {
    const val = document.getElementById('password-input').value;
    if (val === getPassword()) {
      sessionStorage.setItem('authed', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      init();
    } else {
      document.getElementById('login-error').textContent = 'Incorrect password. Try again.';
      document.getElementById('password-input').value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('authed');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
    document.getElementById('login-error').textContent = '';
    if (countdownTimer) clearInterval(countdownTimer);
  }

  // Stay logged in across page refreshes
  if (sessionStorage.getItem('authed') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  function openPwModal() {
    document.getElementById('pw-modal').classList.add('open');
    ['pw-current','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pw-error').textContent = '';
  }
  function closePwModal() { document.getElementById('pw-modal').classList.remove('open'); }

  function changePassword() {
    const cur = document.getElementById('pw-current').value;
    const nw  = document.getElementById('pw-new').value;
    const con = document.getElementById('pw-confirm').value;
    const err = document.getElementById('pw-error');
    if (cur !== getPassword()) { err.textContent = 'Current password is incorrect.'; return; }
    if (nw.length < 6)         { err.textContent = 'New password must be at least 6 characters.'; return; }
    if (nw !== con)            { err.textContent = 'Passwords do not match.'; return; }
    localStorage.setItem('dashPassword', nw);
    closePwModal();
    showToast('✓ Password updated');
  }

  // ─── PIPELINES ────────────────────────────────────────────────────────────
  const PIPELINES = [
    { id: 'sabine',    name: 'Sabine Hub',    url: 'https://www.sabinepipe.com/infoPosts' },
    { id: 'tgp',       name: 'TGP',           url: 'https://ebb.tenn.com/ebb/informational-postings' },
    { id: 'tgp-z0',    name: 'TGP Z0',        url: 'https://ebb.tenn.com/ebb/informational-postings' },
    { id: 'tgp-100l',  name: 'TGP 100L',      url: 'https://ebb.tenn.com/ebb/informational-postings' },
    { id: 'tgp-800l',  name: 'TGP 800L',      url: 'https://ebb.tenn.com/ebb/informational-postings' },
    { id: 'tgp-500l',  name: 'TGP 500L',      url: 'https://ebb.tenn.com/ebb/informational-postings' },
    { id: 'sonat',     name: 'Sonat',         url: 'https://ebb.sonat.com/ebb/informational-postings' },
    { id: 'txgas',     name: 'Texas Gas',     url: 'https://ebb.txgas.com/informational-postings' },
    { id: 'colgulf',   name: 'Columbia Gulf', url: 'https://ebb.columbiagulf.com/informational-postings' },
    { id: 'tiger',     name: 'Tiger',         url: 'https://www.tigerpipeline.com/infoPosts' },
    { id: 'ngpl',      name: 'NGPL',          url: 'https://gas.nicor.com/ebb/informational-postings' },
    { id: 'rex',       name: 'REX',           url: 'https://www.rexpipeline.com/info-posts/' },
    { id: 'rover',     name: 'Rover',         url: 'https://www.roverpipeline.com/informational-postings' },
    { id: 'tetco',     name: 'TETCO',         url: 'https://ebb.tetco.com/ebb/informational-postings' },
    { id: 'stx',       name: 'STX',           url: 'https://ebb.tetco.com/ebb/informational-postings' },
    { id: 'wla',       name: 'WLA/ELA',       url: 'https://ebb.tetco.com/ebb/informational-postings' },
    { id: 'anr',       name: 'ANR',           url: 'https://ebb.anr.com/ebb/informational-postings' },
    { id: 'ml2se',     name: 'ML2-SE',        url: 'https://ebb.anr.com/ebb/informational-postings' },
    { id: 'anr-se',    name: 'SE (ANR)',       url: 'https://ebb.anr.com/ebb/informational-postings' },
    { id: 'egt',       name: 'EGT',           url: 'https://ebb.egt.com/informational-postings' },
    { id: 'transco',   name: 'Transco',       url: 'https://ebb.williams.com/ebb/informational-postings' },
    { id: 'bridge',    name: 'Bridgeline',    url: 'https://www.bridgelineholdings.com/infoPosts' },
    { id: 'mep',       name: 'MEP',           url: 'https://www.midcontinentexpress.com/infoPosts' },
    { id: 'fgt',       name: 'FGT',           url: 'https://ebb.fgt.com/ebb/informational-postings' },
    { id: 'regency',   name: 'Regency',       url: 'https://www.regencygas.com/infoPosts' },
    { id: 'gulfrun',   name: 'Gulf Run',      url: 'https://www.gulfrunpipeline.com/informational-postings' },
    { id: 'gulfsouth', name: 'Gulf South',    url: 'https://ebb.gulfsouth.com/ebb/informational-postings' },
  ];

  // ─── SIMULATED DATA ───────────────────────────────────────────────────────
  // Replace simulateFetch() with real API calls once backend is ready
  const TITLES = [
    'OFO Declared – Operational Flow Order',
    'System Advisory – High Linepack',
    'Capacity Reduction Notice – Maintenance',
    'Force Majeure – Compressor Station Outage',
    'Scheduling Flexibility Notice',
    'Critical Period Declaration',
    'Swing Service Suspension',
    'Operational Notice – Planned Maintenance',
  ];
  const SUMMARIES = [
    'Effective gas day beginning 0900 CT. All shippers required to balance nominations within tolerance. Penalties apply for imbalances exceeding 5% of ADQ.',
    'Linepack above operational limits. Shippers requested to reduce injections and increase withdrawals until further notice.',
    'Compression capacity reduced at Station 47 due to scheduled maintenance. Expect 15% throughput reduction through the affected segment.',
    'Force majeure declared at Compressor Station 12. All affected nominations subject to pro-rata curtailment.',
    'Enhanced scheduling flexibility available for the current gas day. Contact scheduling desk for details.',
    'Critical period in effect. Priority nominations only. Non-critical flow curtailment until system normalizes.',
  ];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function hoursAgo(max) {
    const d = new Date();
    d.setHours(d.getHours() - Math.floor(Math.random() * max));
    d.setMinutes(d.getMinutes() - Math.floor(Math.random() * 60));
    return d;
  }
  function fmt(d) {
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }
  function simulateFetch() {
    const r = Math.random();
    if (r < 0.15) return { status:'none', posting:null };
    const isNew = r > 0.75;
    const postedAt = hoursAgo(isNew ? 3 : 48);
    return { status: isNew ? 'new' : 'active', posting: {
      title: pick(TITLES), summary: pick(SUMMARIES), postedAt,
      effectiveDate: new Date(postedAt.getTime() + 3600000)
    }};
  }

  // ─── STATE ────────────────────────────────────────────────────────────────
  let pipelineData = {};
  let currentFilter = 'all';
  let searchQuery = '';
  let countdownSeconds = 15 * 60;
  let countdownTimer = null;
  let alertEmail = localStorage.getItem('alertEmail') || '';

  function init() {
    if (alertEmail) {
      document.getElementById('email-input').value = alertEmail;
      document.getElementById('email-status').textContent = '✓ Saved';
      document.getElementById('email-status').style.color = '#1a5c38';
    }
    PIPELINES.forEach(p => { pipelineData[p.id] = { status:'loading' }; });
    renderGrid();
    refreshAll();
  }

  if (sessionStorage.getItem('authed') === '1') init();

  // ─── REFRESH ──────────────────────────────────────────────────────────────
  function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.textContent = '↻ Refreshing...'; btn.style.opacity = '0.5';
    const prev = { ...pipelineData };
    PIPELINES.forEach(p => { pipelineData[p.id] = simulateFetch(); });
    const newOnes = PIPELINES.filter(p => {
      const c = pipelineData[p.id], v = prev[p.id];
      return c.status === 'new' && (!v || v.status !== 'new');
    });
    if (newOnes.length > 0 && alertEmail) {
      showToast(`📧 New posting alert: ${newOnes.map(p => p.name).join(', ')}`);
    }
    renderGrid();
    document.getElementById('last-refresh-time').textContent = new Date().toLocaleTimeString();
    resetCountdown();
    btn.textContent = '↻ Refresh'; btn.style.opacity = '1';
  }

  function resetCountdown() {
    countdownSeconds = 15 * 60;
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdownSeconds--;
      const m = String(Math.floor(countdownSeconds/60)).padStart(2,'0');
      const s = String(countdownSeconds%60).padStart(2,'0');
      document.getElementById('countdown').textContent = `${m}:${s}`;
      if (countdownSeconds <= 0) refreshAll();
    }, 1000);
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('pipeline-grid');
    grid.innerHTML = '';
    const visible = PIPELINES.filter(p => {
      const d = pipelineData[p.id];
      const mf = currentFilter==='all' ||
        (currentFilter==='new'    && d?.status==='new') ||
        (currentFilter==='active' && d?.status==='active') ||
        (currentFilter==='none'   && d?.status==='none');
      return mf && p.name.toLowerCase().includes(searchQuery.toLowerCase());
    });
    document.getElementById('pipeline-count').textContent = visible.length;
    visible.forEach(p => {
      const d = pipelineData[p.id] || { status:'loading' };
      let cc='pipeline-card', bc='pipeline-badge', bt='';
      if      (d.status==='new')     { cc+=' has-new';     bc+=' badge-new';     bt='● New'; }
      else if (d.status==='active')  { cc+=' has-posting'; bc+=' badge-active';  bt='Active'; }
      else if (d.status==='none')    { cc+=' no-posting';  bc+=' badge-none';    bt='No Posting'; }
      else                           {                      bc+=' badge-loading'; bt='Loading...'; }
      let body = '';
      if (d.status==='loading') {
        body = `<div class="no-posting-msg">Fetching...</div>`;
      } else if (d.status==='none') {
        body = `<div class="no-posting-msg">No active informational postings at this time.</div>`;
      } else {
        const post = d.posting;
        body = `
          <div class="posting-title">${post.title}</div>
          <div class="posting-meta">
            <span>Posted: ${fmt(post.postedAt)}</span>
            <span>Effective: ${fmt(post.effectiveDate)}</span>
          </div>
          <div class="posting-summary">${post.summary}</div>
          <a class="view-link" href="${p.url}" target="_blank" rel="noopener">→ View Full Posting</a>`;
      }
      const card = document.createElement('div');
      card.className = cc;
      card.innerHTML = `
        <div class="card-header">
          <div class="pipeline-name">${p.name}</div>
          <div class="${bc}">${bt}</div>
        </div>
        <div class="card-body">${body}</div>`;
      grid.appendChild(card);
    });
  }

  function setFilter(f,btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }
  function filterSearch(q) { searchQuery = q; renderGrid(); }

  function saveEmail() {
    const val = document.getElementById('email-input').value.trim();
    const status = document.getElementById('email-status');
    if (!val || !val.includes('@')) { status.textContent='✗ Invalid email'; status.style.color='#8a1a1a'; return; }
    alertEmail = val;
    localStorage.setItem('alertEmail', val);
    status.textContent = '✓ Saved'; status.style.color = '#1a5c38';
    showToast('Email alert saved');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
